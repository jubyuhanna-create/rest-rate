<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Restaurant Feedback</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Hebrew:wght@300;400;500;600&family=Noto+Sans+Arabic:wght@300;400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Language Switcher -->
  <div class="lang-bar">
    <button class="lang-btn active" data-lang="he">עב</button>
    <button class="lang-btn" data-lang="ar">ع</button>
    <button class="lang-btn" data-lang="en">EN</button>
  </div>

  <!-- ── SCREEN 1: Rating ── -->
  <div class="screen active" id="screen-rating">
    <div class="screen-inner">
      <div class="logo-mark">✦</div>
      <h1 class="main-question" data-i18n="question">איך הייתה החוויה שלך?</h1>
      <p class="sub-hint" data-i18n="tap_hint">הקש על כוכב לדירוג</p>

      <div class="stars-row" id="stars-row" role="group" aria-label="Rating">
        <button class="star" data-val="1" aria-label="1 star">★</button>
        <button class="star" data-val="2" aria-label="2 stars">★</button>
        <button class="star" data-val="3" aria-label="3 stars">★</button>
        <button class="star" data-val="4" aria-label="4 stars">★</button>
        <button class="star" data-val="5" aria-label="5 stars">★</button>
      </div>
    </div>
  </div>

  <!-- ── SCREEN 2: Feedback ── -->
  <div class="screen" id="screen-feedback">
    <div class="screen-inner">

      <!-- High rating (4–5) -->
      <div id="high-rating-block" class="rating-block hidden">
        <div class="emoji-display">🙌</div>
        <h2 class="feedback-title" data-i18n="positive_msg">שמחים שנהנית!</h2>

        <a href="#" id="google-link-high" class="btn btn-primary btn-google" target="_blank" rel="noopener">
          <span class="btn-icon">⭐</span>
          <span data-i18n="google_btn">שתף ביקורת בגוגל</span>
        </a>

        <div class="optional-note">
          <textarea id="comment-high" class="note-input" rows="3" data-i18n-placeholder="note_placeholder"></textarea>
          <button class="btn btn-ghost send-note-btn" id="send-high-btn" data-i18n="send_note">שלח הערה</button>
        </div>
      </div>

      <!-- Low rating (1–3) -->
      <div id="low-rating-block" class="rating-block hidden">
        <div class="emoji-display">🙏</div>
        <h2 class="feedback-title" data-i18n="negative_msg">נרצה להשתפר עבורך</h2>

        <textarea id="comment-low" class="note-input note-input--prominent" rows="4" data-i18n-placeholder="what_went_wrong"></textarea>

        <div class="btn-stack">
          <button class="btn btn-primary" id="send-low-btn" data-i18n="send_feedback">שלח משוב</button>
          <a href="#" id="google-link-low" class="btn btn-outline btn-google" target="_blank" rel="noopener">
            <span class="btn-icon">⭐</span>
            <span data-i18n="google_btn">שתף ביקורת בגוגל</span>
          </a>
        </div>
      </div>

    </div>
  </div>

  <!-- ── SCREEN 3: Thank You ── -->
  <div class="screen" id="screen-thanks">
    <div class="screen-inner">
      <div class="thanks-icon">🙌</div>
      <h2 class="thanks-title" data-i18n="thanks_title">תודה על המשוב שלך!</h2>
      <p class="thanks-sub" data-i18n="thanks_sub">המשוב שלך חשוב לנו מאד</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
